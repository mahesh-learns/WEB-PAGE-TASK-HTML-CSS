<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        body{
            background-image: linear-gradient(to right,black,white,black);
        }
        #information,h2{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }
        h2{
            /* background-color: black; */
            border: 2px solid black;
            color: black;
            padding: 10px 20px;
            border-radius: 20px;
            gap: 10px;
        }
        table{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 10px 20px;
        }
        #buttons{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        td{
            padding: 10px 20px;
        }
        #buttons input{
            padding: 10px 20px;
            border-radius: 20px;
            border: 2px solid black;
            /* background-color: black; */
            color: black;
            border-radius: 20px;
        }
        #buttons input:hover{
            background-color: black;
            color: white;
            transition: 0.5s;
        }
    </style>
</head>
<body>
    <form>
    <div id="information">
        <h2>Forgot Password</h2></div>
           <div id = "table-container">
             <table>
                <tr>
                <td><label for="email">Email Address</label></td>
                <td>:</td>
                <td><input type="email" id="email" name="email" required></td>
            </tr>
            <tr>
                <td><label for="otp"> Enter Otp</label></td>
                <td>:</td>
                <td><input type="number" id="otp" name="otp" required></td>
            </tr>
            <tr>
                <td><label for="new-password">New Password</label></td>
                <td>:</td>
                <td><input type="password" id="new-password" name="new-password" required></td>
            </tr>
            <tr>
                <td><label for="confirm-password">Confirm Password</label></td>
                <td>:</td>
                <td><input type="password" id="confirm-password" name="confirm-password" required></td>
                <br><br>
            </tr>
        </table>
        </div>
        <br>
        <br>
        <div id="buttons">
            <input type="submit" value="Reset" id="submit">
            <input type="reset" value="Cancel" id="cancel"></div>
    </div>
</body>
</html>
