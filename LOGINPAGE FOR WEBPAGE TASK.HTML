<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body{
            background-image: linear-gradient(to right,black,white,black);
        }
        form{
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            top: 150px;
        }
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        #information h2{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            /* background-color: black; */
            border: 2px solid black;
            color: black;
            padding: 10px 20px;
            border-radius: 20px;
            gap: 10px;
        }
        #buttons{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            gap: 20px;
        }
        #submit,#cancel{
            padding: 10px 20px;
            border-radius: 20px;
            border: 2px solid black;
            /* background-color: black; */
            color: black;
            border-radius: 20px;
        }
        #submit:hover,#cancel:hover{
            background-color: black;
            color: white;
            transition: 0.5s;
        }
        #forgot-password{
            text-decoration: none;
            color:blue;
        }
    </style>
</head>
<body>
      <form>

            <div>
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Remember Me</label>
            </div><br>
                <a id="forgot-password" href="C:\Users\Mahesh\Desktop\WEB TECH\FORGOT PASSWORD FOR WEBPAGE TASK.HTML" target="_blank">Forgot Password?</a>
                <br>
                <br>
                <div id ="buttons">
            <input  id ="submit" type="submit" value="Login">
            <input id="cancel" type="button" value="Cancel"></div>
            </div>

      </form>
</body>
</html>
